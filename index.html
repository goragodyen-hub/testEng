<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Grammar Quiz: Present Tenses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Prompt:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
        <div class="shape shape-6"></div>
    </div>

    <div class="container">
        <!-- Start Screen -->
        <div id="start-screen" class="glass-card active">
            <h1>Present Simple VS Continuous</h1>
            <p>แบบทดสอบ 30 ข้อ สำหรับวัยรุ่น คุณากร (สุ่มจาก 60 ข้อ)</p>
            <div class="features">
                <span>🎯 คละความยากง่าย</span>
                <span>⏱️ ไม่จับเวลา</span>
                <span>💡 มีเฉลยตอนท้าย</span>
            </div>
            <button id="start-btn" class="primary-btn">เริ่มทำแบบทดสอบเลย!</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="glass-card hidden">
            <div class="quiz-header">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div class="status-text">
                    ข้อที่ <span id="current-q-range">1</span> จาก <span id="total-q">30</span>
                </div>
            </div>
            
            <div id="questions-container">
                <!-- Questions will be injected here -->
            </div>

            <div class="quiz-footer">
                <button id="prev-btn" class="secondary-btn hidden">ย้อนกลับ</button>
                <button id="next-btn" class="primary-btn">ถัดไป</button>
                <button id="submit-btn" class="primary-btn hidden">ส่งคำตอบ</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="result-screen" class="glass-card hidden">
            <h2>ผลคะแนนของคุณ</h2>
            <div class="score-display">
                <span id="score">0</span> / 30
            </div>
            <p id="score-message">ยอดเยี่ยมมาก!</p>
            
            <div class="answer-key-section">
                <h3>เฉลย (Answer Key)</h3>
                <div id="answer-key-container">
                    <!-- Answers will be injected here -->
                </div>
            </div>

            <button id="restart-btn" class="primary-btn mt-20">ทำแบบทดสอบอีกครั้ง</button>
        </div>
    </div>

    <script src="questions.js"></script>
    <script src="app.js"></script>
</body>
</html>
